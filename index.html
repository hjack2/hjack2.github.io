<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gabbo Is Coming</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* Subtle radial glow in background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      padding: 3.5rem 5rem;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(99, 102, 241, 0.12),
        0 24px 64px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.7), transparent);
      border-radius: 999px;
    }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6366f1;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 1rem;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.01em;
    }

    .divider {
      width: 3rem;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 999px;
      margin: 1.8rem auto 0;
    }

    /* Nyan Cat */
    @keyframes fly {
      from { transform: translateX(-160px); }
      to   { transform: translateX(calc(100vw + 160px)); }
    }
    @keyframes bob {
      0%, 100% { top: calc(100vh - 80px); }
      50%       { top: calc(100vh - 100px); }
    }
    @keyframes legs {
      0%   { content: '🐾'; }
      50%  { content: '  '; }
      100% { content: '🐾'; }
    }

    .nyan {
      position: fixed;
      top: calc(100vh - 88px);
      left: 0;
      display: flex;
      align-items: center;
      gap: 0;
      animation:
        fly 6s linear infinite,
        bob 0.4s ease-in-out infinite;
      pointer-events: none;
      z-index: 999;
    }

    .nyan-rainbow {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-right: -2px;
    }
    .nyan-rainbow span {
      display: block;
      width: 80px;
      height: 7px;
      border-radius: 2px 0 0 2px;
    }
    .nyan-rainbow span:nth-child(1) { background: #ff0000; }
    .nyan-rainbow span:nth-child(2) { background: #ff8800; }
    .nyan-rainbow span:nth-child(3) { background: #ffee00; }
    .nyan-rainbow span:nth-child(4) { background: #33cc33; }
    .nyan-rainbow span:nth-child(5) { background: #3399ff; }
    .nyan-rainbow span:nth-child(6) { background: #bb44ff; }

    .nyan-cat {
      font-size: 2.6rem;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(255,180,255,0.6));
      animation: spin-legs 0.2s steps(1) infinite;
    }

    @keyframes spin-legs {
      0%   { transform: scaleY(1); }
      50%  { transform: scaleY(0.88); }
      100% { transform: scaleY(1); }
    }

    .nyan-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 998;
      overflow: hidden;
    }
    .nyan-stars span {
      position: absolute;
      font-size: 1rem;
      opacity: 0;
      animation: twinkle 1s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%   { opacity: 0; transform: scale(0.5); }
      50%  { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(0.5); }
    }
  </style>
</head>
<body>
  <!-- Nyan Cat -->
  <div class="nyan">
    <div class="nyan-rainbow">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="nyan-cat">🐱</div>
  </div>

  <!-- Twinkling stars -->
  <div class="nyan-stars">
    <span style="left:10%;top:20%;animation-delay:0s">✦</span>
    <span style="left:25%;top:70%;animation-delay:0.3s">✦</span>
    <span style="left:45%;top:15%;animation-delay:0.6s">✧</span>
    <span style="left:65%;top:55%;animation-delay:0.9s">✦</span>
    <span style="left:80%;top:30%;animation-delay:0.2s">✧</span>
    <span style="left:90%;top:75%;animation-delay:0.7s">✦</span>
    <span style="left:5%; top:85%;animation-delay:0.4s">✧</span>
    <span style="left:55%;top:85%;animation-delay:1.1s">✦</span>
  </div>

  <div class="card">
    <p class="eyebrow">Coming Soon</p>
    <h1>Gabbo Is Coming</h1>
    <p class="subtitle">Four days 'til Gabbo</p>
    <div class="divider"></div>
  </div>
</body>
</html>
